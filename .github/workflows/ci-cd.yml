name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: backend

jobs:

  ####################################################
  # 1. UNIT TESTS
  ####################################################

  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install Dependencies
        working-directory: backend
        run: npm ci

      - name: Wait for MongoDB
        run: |
          for i in {1..30}; do
            nc -z localhost 27017 && break
            echo "Waiting for MongoDB..."
            sleep 2
          done

      - name: Run Unit Tests
        working-directory: backend
        env:
          MONGODB_URL: mongodb://localhost:27017/ecommerce
        run: npm test

  ####################################################
  # 2. SECURITY SCAN
  ####################################################

  security_scan:
    name: Trivy Security Scan
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1

  ####################################################
  # 3. VERSIONING
  ####################################################

  versioning:
    name: Generate Version
    needs: security_scan
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Generate Version
        id: version
        run: |
          VERSION=v1.0.${{ github.run_number }}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Generated Version: $VERSION"

  ####################################################
  # 4. BUILD & PUSH DOCKER IMAGE
  ####################################################

  docker_build_push:
    name: Build and Push Docker Image
    needs: versioning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/backend
          tags: |
            type=raw,value=${{ needs.versioning.outputs.version }}
            type=raw,value=latest

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  ####################################################
  # 5. FINAL SLACK NOTIFICATION
  ####################################################

  notify:
    name: Slack Notification
    runs-on: ubuntu-latest
    if: always()

    needs:
      - test
      - security_scan
      - versioning
      - docker_build_push

    steps:
      - name: Notify Success
        if: ${{ needs.test.result == 'success' && needs.security_scan.result == 'success' && needs.versioning.result == 'success' && needs.docker_build_push.result == 'success' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚀 DevOps Pipeline Completed Successfully\n\n✅ Unit Tests Passed\n✅ Security Scan Passed\n✅ Version Created\n✅ Docker Image Built & Pushed\n\nVersion: ${{ needs.versioning.outputs.version }}"
            }

      - name: Notify Failure
        if: ${{ needs.test.result != 'success' || needs.security_scan.result != 'success' || needs.versioning.result != 'success' || needs.docker_build_push.result != 'success' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ DevOps Pipeline Failed\n\nTest: ${{ needs.test.result }}\nSecurity Scan: ${{ needs.security_scan.result }}\nVersioning: ${{ needs.versioning.result }}\nDocker Build: ${{ needs.docker_build_push.result }}"
            }
