name: Production CI/CD Pipeline

on:
  push:
    branches:
      - master

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  IMAGE_NAME: backend

jobs:

############################################################
# 1. TEST
############################################################
  test:
    name: Run Unit Tests
    runs-on: [self-hosted, linux]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # unique mongo container to avoid conflict
      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.0
        with:
          mongodb-version: 7
          mongodb-container-name: ci-mongo-${{ github.run_id }}
          mongodb-port: 27018

      - name: Install Dependencies
        working-directory: backend
        run: npm ci --prefer-offline

      - name: Run Tests
        working-directory: backend
        env:
          NODE_ENV: test
          MONGODB_URL: mongodb://localhost:27018/ecommerce
        run: npm test


############################################################
# 2. SECURITY SCAN
############################################################
  security_scan:
    name: Security Scan
    needs: test
    runs-on: [self-hosted, linux]

    steps:
      - uses: actions/checkout@v5

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1


############################################################
# 3. VERSIONING
############################################################
  versioning:
    name: Generate Version
    needs: security_scan
    runs-on: [self-hosted, linux]

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Semantic Version
        id: version
        uses: PaulHatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "BREAKING CHANGE"
          minor_pattern: "feat"
          format: "${major}.${minor}.${patch}"


############################################################
# 4. BUILD + PUSH
############################################################
  docker_build_push:
    name: Build and Push Docker Image
    needs: versioning
    runs-on: [self-hosted, linux]

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # generate labels + tags automatically
      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/backend
          tags: |
            type=raw,value=${{ needs.versioning.outputs.version }}
            type=raw,value=latest
            type=sha
          labels: |
            org.opencontainers.image.title=backend
            org.opencontainers.image.description=Node React Ecommerce API
            org.opencontainers.image.version=${{ needs.versioning.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


############################################################
# 5. DEPLOY
############################################################
  deploy:
    name: Production Deploy
    needs: docker_build_push
    runs-on: [self-hosted, linux]

    steps:
      - uses: actions/checkout@v5

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # safer deployment
      - name: Pull New Image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/backend:latest

      - name: Restart Backend
        run: |
          cd /home/ubuntu/node-react-ecommerce
          docker compose stop backend
          docker compose rm -f backend
          docker compose up -d backend


############################################################
# 6. SLACK
############################################################
  notify:
    name: Slack Notification
    if: always()
    needs:
      - test
      - security_scan
      - versioning
      - docker_build_push
      - deploy
    runs-on: [self-hosted, linux]

    steps:
      - name: Slack Success
        if: ${{ needs.deploy.result == 'success' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "SUCCESS ✅

              Version: ${{ needs.versioning.outputs.version }}

              Test: Passed
              Security: Passed
              Docker Push: Passed
              Deployment: Passed"
            }

      - name: Slack Failure
        if: ${{ needs.deploy.result != 'success' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "FAILED ❌

              Test: ${{ needs.test.result }}
              Security: ${{ needs.security_scan.result }}
              Docker: ${{ needs.docker_build_push.result }}
              Deploy: ${{ needs.deploy.result }}"
            }
