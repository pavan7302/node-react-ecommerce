name: CI-CD Pipeline

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  IMAGE_NAME: ecommerce-app

jobs:

  unit-test:
    name: Unit Test
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      - name: Run Unit Tests
        run: |
          cd backend
          npm test


  security-scan:
    name: Security Scan
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH


  versioning:
    name: Versioning
    runs-on: self-hosted

    outputs:
      version: ${{ steps.tag.outputs.version }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Version
        id: tag
        run: |
          VERSION=v1.${{ github.run_number }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Git Tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git tag ${{ steps.tag.outputs.version }}
          git push origin ${{ steps.tag.outputs.version }}


  docker-build-push:
    name: Docker Build Push
    runs-on: self-hosted

    needs:
      - unit-test
      - security-scan
      - versioning

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4


      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:${{ github.sha }}


      - name: Build Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:${{ github.sha }}


  slack-notification:
    name: Slack Notification
    runs-on: self-hosted

    needs:
      - unit-test
      - security-scan
      - versioning
      - docker-build-push

    if: always()

    steps:
      - name: Slack Success Notification
        if: ${{ needs.unit-test.result == 'success' && needs.security-scan.result == 'success' && needs.versioning.result == 'success' && needs.docker-build-push.result == 'success' }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: good
          SLACK_TITLE: Pipeline Success
          SLACK_MESSAGE: |
            CI/CD Pipeline Completed Successfully

            Unit Test : Success
            Security Scan : Success
            Versioning : Success
            Docker Build Push : Success

            Commit : ${{ github.sha }}


      - name: Slack Failure Notification
        if: ${{ needs.unit-test.result != 'success' || needs.security-scan.result != 'success' || needs.versioning.result != 'success' || needs.docker-build-push.result != 'success' }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: danger
          SLACK_TITLE: Pipeline Failed
          SLACK_MESSAGE: |
            CI/CD Pipeline Failed

            Unit Test : ${{ needs.unit-test.result }}
            Security Scan : ${{ needs.security-scan.result }}
            Versioning : ${{ needs.versioning.result }}
            Docker Build Push : ${{ needs.docker-build-push.result }}

            Commit : ${{ github.sha }}
