name: Production CI/CD Pipeline

on:
  push:
    branches:
      - master
    paths-ignore:
      - README.md
      - docs/**

concurrency:
  group: production-pipeline
  cancel-in-progress: true

jobs:

############################################################
# 1. UNIT TEST
############################################################
  unit_test:
    name: Unit Test
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # unique name avoids mongodb conflict with deployed container
      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.0
        with:
          mongodb-version: 7
          mongodb-container-name: ci-mongo-${{ github.run_id }}
          mongodb-port: 27018

      - name: Install Dependencies
        working-directory: backend
        run: npm ci --prefer-offline --no-audit

      - name: Run Tests
        working-directory: backend
        env:
          NODE_ENV: test
          MONGODB_URL: mongodb://localhost:27018/ecommerce
        run: npm test


############################################################
# 2. SECURITY SCAN
############################################################
  security_scan:
    name: Security Scan
    needs: unit_test
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./backend
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1


############################################################
# 3. VERSIONING
############################################################
  versioning:
    name: Versioning
    needs: security_scan
    runs-on: [self-hosted, linux]

    outputs:
      version: ${{ steps.semantic.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate Semantic Version
        id: semantic
        uses: PaulHatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "BREAKING CHANGE"
          minor_pattern: "feat"
          format: "${major}.${minor}.${patch}"


############################################################
# 4. BUILD AND PUSH
############################################################
  build_push:
    name: Build and Push Docker Image
    needs: versioning
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # automatic tags + labels
      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/backend
          tags: |
            type=raw,value=${{ needs.versioning.outputs.version }}
            type=raw,value=latest
            type=sha
          labels: |
            org.opencontainers.image.title=backend
            org.opencontainers.image.description=Node Ecommerce Backend API
            org.opencontainers.image.version=${{ needs.versioning.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.repository }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          # build cache → reduces runtime a lot
          cache-from: type=gha
          cache-to: type=gha,mode=max


############################################################
# 5. SLACK NOTIFICATION
############################################################
  slack:
    name: Slack Notification
    if: always()

    needs:
      - unit_test
      - security_scan
      - versioning
      - build_push

    runs-on: [self-hosted, linux]

    steps:
      - name: Notify Success
        if: ${{ needs.unit_test.result == 'success' && needs.security_scan.result == 'success' && needs.versioning.result == 'success' && needs.build_push.result == 'success' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ CI/CD Pipeline Successful

              Version: ${{ needs.versioning.outputs.version }}

              Unit Test: Passed
              Security Scan: Passed
              Docker Build & Push: Passed"
            }

      - name: Notify Failure
        if: ${{ needs.unit_test.result != 'success' || needs.security_scan.result != 'success' || needs.versioning.result != 'success' || needs.build_push.result != 'success' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Pipeline Failed

              Unit Test: ${{ needs.unit_test.result }}
              Security Scan: ${{ needs.security_scan.result }}
              Versioning: ${{ needs.versioning.result }}
              Build Push: ${{ needs.build_push.result }}"
            }
