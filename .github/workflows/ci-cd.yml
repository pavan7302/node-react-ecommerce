name: Production CI/CD Pipeline

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: backend

permissions:
  contents: write

jobs:

  #########################################################
  # 1. UNIT TEST
  #########################################################
  unit_test:
    name: Unit Test
    runs-on:
      - self-hosted
      - Linux

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # Mongo for CI only (safe now because separate runner EC2)
      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.0
        with:
          mongodb-version: 7
          mongodb-port: 27017
          mongodb-container-name: ci-mongo

      - name: Install Dependencies
        working-directory: backend
        run: npm ci --prefer-offline --no-audit

      - name: Run Unit Tests
        working-directory: backend
        env:
          NODE_ENV: test
          MONGODB_URL: mongodb://localhost:27017/ecommerce
        run: npm test


  #########################################################
  # 2. SECURITY SCAN
  #########################################################
  security_scan:
    name: Security Scan
    needs: unit_test
    runs-on:
      - self-hosted
      - Linux

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: table
          exit-code: 1


  #########################################################
  # 3. VERSIONING
  #########################################################
  versioning:
    name: Generate Version
    needs: security_scan
    runs-on:
      - self-hosted
      - Linux

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # simple version based on run number
      - name: Generate Version
        id: version
        run: |
          VERSION=v1.0.${{ github.run_number }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated Version: $VERSION"


  #########################################################
  # 4. BUILD AND PUSH
  #########################################################
  build_push:
    name: Build and Push Docker
    needs: versioning
    runs-on:
      - self-hosted
      - Linux

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/backend
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.versioning.outputs.version }}
            type=sha
          labels: |
            org.opencontainers.image.title=backend
            org.opencontainers.image.description=Node React Ecommerce Backend
            org.opencontainers.image.version=${{ needs.versioning.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}


  #########################################################
  # 5. DEPLOY TO PRODUCTION EC2
  #########################################################
  deploy:
    name: Deploy Application
    needs: build_push
    runs-on:
      - self-hosted
      - Linux

    steps:
      - name: Deploy using SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/node-react-ecommerce
            docker pull ${{ secrets.DOCKER_USERNAME }}/backend:latest
            docker compose down
            docker compose up -d


  #########################################################
  # 6. SLACK NOTIFICATION
  #########################################################
  slack_notification:
    name: Slack Notification
    if: always()

    needs:
      - unit_test
      - security_scan
      - versioning
      - build_push
      - deploy

    runs-on:
      - self-hosted
      - Linux

    steps:
      - name: Notify Success
        if: ${{ needs.deploy.result == 'success' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "SUCCESS ✅

              Version: ${{ needs.versioning.outputs.version }}

              Unit Test: Passed
              Security Scan: Passed
              Docker Build: Passed
              Deployment: Passed"
            }

      - name: Notify Failure
        if: ${{ needs.deploy.result != 'success' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "FAILED ❌

              Unit Test: ${{ needs.unit_test.result }}
              Security Scan: ${{ needs.security_scan.result }}
              Build: ${{ needs.build_push.result }}
              Deploy: ${{ needs.deploy.result }}"
            }
