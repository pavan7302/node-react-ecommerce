name: Production DevOps Pipeline

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  IMAGE_NAME: backend

##############################################################
# 1. UNIT TEST
##############################################################

jobs:

  unit_test:
    name: Unit Test
    runs-on:
      - self-hosted
      - ci-runner

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # remove stale containers from previous failed runs
      - name: Cleanup Old Mongo Containers
        run: |
          docker rm -f $(docker ps -aq --filter "name=ci-mongo") || true

      # no fixed port -> avoids port conflicts
      - name: Start MongoDB for Tests
        uses: supercharge/mongodb-github-action@1.12.0
        with:
          mongodb-version: 7.0
          mongodb-container-name: ci-mongo

      - name: Install Dependencies
        working-directory: backend
        run: npm ci

      - name: Run Unit Tests
        working-directory: backend
        env:
          MONGODB_URL: mongodb://localhost:27017/ecommerce
          NODE_ENV: test
        run: npm test


##############################################################
# 2. SECURITY SCAN
##############################################################

  security_scan:
    name: Security Scan
    needs: unit_test
    runs-on:
      - self-hosted
      - ci-runner

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1


##############################################################
# 3. VERSIONING
##############################################################

  versioning:
    name: Versioning
    needs: security_scan
    runs-on:
      - self-hosted
      - ci-runner

    outputs:
      version: ${{ steps.version.outputs.new_tag }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # simple auto version bump
      - name: Generate Version Tag
        id: version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v


##############################################################
# 4. BUILD + PUSH
##############################################################

  build_push:
    name: Build and Push Docker Image
    needs: versioning
    runs-on:
      - self-hosted
      - ci-runner

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # dynamic tags + OCI labels
      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/backend
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.versioning.outputs.version }}
            type=sha
            type=ref,event=branch
          labels: |
            org.opencontainers.image.title=backend
            org.opencontainers.image.description=Node React Ecommerce Backend
            org.opencontainers.image.version=${{ needs.versioning.outputs.version }}
            org.opencontainers.image.revision={{sha}}

      # build cache enabled
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


##############################################################
# 5. DEPLOY TO PROD EC2-1 OVER SSH
##############################################################

  deploy:
    name: Deploy to Production
    needs: build_push
    runs-on:
      - self-hosted
      - ci-runner

    steps:
      - name: Deploy Over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /home/ubuntu/node-react-ecommerce
            docker compose pull
            docker compose down
            docker compose up -d


##############################################################
# 6. SLACK NOTIFICATION
##############################################################

  notify:
    name: Slack Notification
    if: always()

    needs:
      - unit_test
      - security_scan
      - versioning
      - build_push
      - deploy

    runs-on:
      - self-hosted
      - ci-runner

    steps:
      - name: Notify Success
        if: ${{ needs.deploy.result == 'success' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚀 Deployment Successful

              Version: ${{ needs.versioning.outputs.version }}

              Unit Test: Passed
              Security Scan: Passed
              Docker Push: Success
              Production Deploy: Success"
            }

      - name: Notify Failure
        if: ${{ needs.deploy.result != 'success' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Pipeline Failed

              Unit Test: ${{ needs.unit_test.result }}
              Security Scan: ${{ needs.security_scan.result }}
              Build: ${{ needs.build_push.result }}
              Deploy: ${{ needs.deploy.result }}"
            }
