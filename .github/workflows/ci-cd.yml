name: Production DevOps Pipeline

on:
  push:
    branches:
      - master

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: backend

jobs:

#############################################################
# 1. UNIT TEST
#############################################################
  unit_test:
    name: Unit Test
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Start MongoDB Container
        uses: supercharge/mongodb-github-action@1.12.0
        with:
          mongodb-version: 7
          mongodb-container-name: ci-mongo-${{ github.run_id }}
          mongodb-port: 27019

      - name: Install Dependencies
        working-directory: backend
        run: npm ci --prefer-offline --no-audit

      - name: Run Unit Tests
        working-directory: backend
        env:
          NODE_ENV: test
          MONGODB_URL: mongodb://localhost:27019/ecommerce
        run: npm test


#############################################################
# 2. SECURITY SCAN
#############################################################
  security_scan:
    name: Security Scan
    needs: unit_test
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: table
          exit-code: 1


#############################################################
# 3. VERSIONING
#############################################################
  versioning:
    name: Semantic Versioning
    needs: security_scan
    runs-on: [self-hosted, linux]

    outputs:
      version: ${{ steps.tag_version.outputs.new_tag }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Auto Increment Version
        id: tag_version
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          WITH_V: true


#############################################################
# 4. BUILD AND PUSH
#############################################################
  build_push:
    name: Build and Push Docker Image
    needs: versioning
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/backend
          tags: |
            type=raw,value=${{ needs.versioning.outputs.version }}
            type=raw,value=latest
            type=sha
            type=ref,event=branch
          labels: |
            org.opencontainers.image.title=backend
            org.opencontainers.image.description=Node React Ecommerce Backend
            org.opencontainers.image.version=${{ needs.versioning.outputs.version }}
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


#############################################################
# 5. SLACK NOTIFICATION
#############################################################
  slack:
    name: Slack Notification
    needs:
      - unit_test
      - security_scan
      - versioning
      - build_push

    if: always()
    runs-on: [self-hosted, linux]

    steps:
      - name: Success Notification
        if: ${{ needs.unit_test.result == 'success' && needs.security_scan.result == 'success' && needs.build_push.result == 'success' }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: good
          SLACK_TITLE: CI/CD Pipeline Success
          SLACK_MESSAGE: |
            Pipeline Successful

            Version : ${{ needs.versioning.outputs.version }}
            Tests : Passed
            Security : Passed
            Docker Push : Success

      - name: Failure Notification
        if: ${{ needs.unit_test.result != 'success' || needs.security_scan.result != 'success' || needs.build_push.result != 'success' }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: danger
          SLACK_TITLE: CI/CD Pipeline Failed
          SLACK_MESSAGE: |
            Pipeline Failed

            Unit Test : ${{ needs.unit_test.result }}
            Security : ${{ needs.security_scan.result }}
            Build : ${{ needs.build_push.result }}
