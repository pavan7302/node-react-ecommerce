name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: backend

jobs:

####################################################
# 1. UNIT TESTS
####################################################

  test:
    name: Unit Tests
    runs-on: self-hosted

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install Dependencies
        working-directory: backend
        run: npm ci

      - name: Wait for MongoDB
        run: |
          for i in {1..30}; do
            nc -z localhost 27017 && break
            echo "Waiting for MongoDB..."
            sleep 2
          done

      - name: Run Unit Tests
        working-directory: backend
        env:
          MONGODB_URL: mongodb://localhost:27017/ecommerce
        run: npm test


####################################################
# 2. SECURITY SCAN
####################################################

  security_scan:
    name: Trivy Security Scan
    needs: test
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1


####################################################
# 3. VERSIONING
####################################################

  versioning:
    name: Generate Version
    needs: security_scan
    runs-on: self-hosted

    outputs:
      version: ${{ steps.version.outputs.new_tag }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Generate Version Tag
        id: version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v


####################################################
# 4. BUILD & PUSH DOCKER IMAGE
####################################################

  docker_build_push:
    name: Build and Push Docker Image
    needs: versioning
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5


      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/backend
          tags: |
            type=raw,value=${{ needs.versioning.outputs.version }}
            type=sha
            type=ref,event=branch
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=backend
            org.opencontainers.image.description=Node React Ecommerce Backend
            org.opencontainers.image.version=${{ needs.versioning.outputs.version }}
            org.opencontainers.image.created={{date 'YYYY-MM-DD'}}
            org.opencontainers.image.revision={{sha}}


      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}


####################################################
# 5. SLACK NOTIFICATION
####################################################

  notify:
    name: Slack Notification
    runs-on: self-hosted
    if: always()

    needs:
      - test
      - security_scan
      - versioning
      - docker_build_push

    steps:
      - name: Notify Success
        if: ${{ needs.test.result == 'success' && needs.security_scan.result == 'success' && needs.versioning.result == 'success' && needs.docker_build_push.result == 'success' }}
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚀 Pipeline Successful

              Version: ${{ needs.versioning.outputs.version }}

              Unit Test: Passed
              Security Scan: Passed
              Docker Push: Success"
            }


      - name: Notify Failure
        if: ${{ needs.test.result != 'success' || needs.security_scan.result != 'success' || needs.versioning.result != 'success' || needs.docker_build_push.result != 'success' }}
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Pipeline Failed

              Test: ${{ needs.test.result }}
              Security: ${{ needs.security_scan.result }}
              Docker: ${{ needs.docker_build_push.result }}"
            }
