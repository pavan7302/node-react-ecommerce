name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: backend

jobs:

  ####################################################
  # 1. UNIT TESTS
  ####################################################
  test:
    name: Unit Tests
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Cleanup Previous Test Containers
        run: |
          docker rm -f testmongo || true

      - name: Start MongoDB Test Instance
        uses: supercharge/mongodb-github-action@1.12.0
        with:
          mongodb-version: 7.0
          mongodb-container-name: testmongo
          mongodb-port: 27018

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci

      - name: Run Unit Tests
        working-directory: backend
        env:
          MONGODB_URL: mongodb://localhost:27018/ecommerce
          NODE_ENV: test
        run: npm test

      - name: Cleanup Test Mongo
        if: always()
        run: |
          docker rm -f testmongo || true

  ####################################################
  # 2. SECURITY SCAN
  ####################################################
  security_scan:
    name: Security Scan
    needs: test
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

  ####################################################
  # 3. VERSIONING
  ####################################################
  versioning:
    name: Generate Version
    needs: security_scan
    runs-on:
      - self-hosted
      - linux

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate Semantic Version
        id: version
        uses: PaulHatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "BREAKING CHANGE"
          minor_pattern: "feat"

  ####################################################
  # 4. BUILD AND PUSH
  ####################################################
  docker_build_push:
    name: Build and Push Docker Image
    needs: versioning
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/backend
          tags: |
            type=raw,value=${{ needs.versioning.outputs.version }}
            type=sha
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=backend
            org.opencontainers.image.version=${{ needs.versioning.outputs.version }}
            org.opencontainers.image.revision={{sha}}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  ####################################################
  # 5. DEPLOY
  ####################################################
  deploy:
    name: Deploy Application
    needs: docker_build_push
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Pull Latest Backend Image
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/backend:latest

      - name: Deploy Updated Containers
        run: |
          cd /home/ubuntu/node-react-ecommerce
          docker compose pull backend
          docker compose up -d backend

  ####################################################
  # 6. HEALTH CHECK
  ####################################################
  health_check:
    name: Verify Deployment
    needs: deploy
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Check Backend API
        run: |
          sleep 15
          curl --fail http://localhost:5000/api/products

  ####################################################
  # 7. SLACK NOTIFICATION
  ####################################################
  notify:
    name: Slack Notification
    if: always()

    needs:
      - test
      - security_scan
      - versioning
      - docker_build_push
      - deploy
      - health_check

    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Notify Success
        if: ${{ needs.health_check.result == 'success' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚀 Pipeline Successful | Version: ${{ needs.versioning.outputs.version }} | Deployment Verified"
            }

      - name: Notify Failure
        if: ${{ needs.health_check.result != 'success' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Pipeline Failed | Check GitHub Actions Logs"
            }
