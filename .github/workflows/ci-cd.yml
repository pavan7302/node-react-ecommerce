name: Ecommerce CI-CD Pipeline

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend

jobs:

# ==================================================
# 1. UNIT TEST
# ==================================================
  unit-test:
    name: Unit Test
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Start MongoDB Container
        run: |
          docker rm -f ci-mongo || true
          docker run -d --name ci-mongo -p 27017:27017 mongo:7
          sleep 8

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      - name: Run Unit Tests
        env:
          NODE_ENV: test
          MONGODB_URL: mongodb://localhost:27017/ecommerce
        run: |
          cd backend
          npm test

      - name: Cleanup MongoDB
        if: always()
        run: |
          docker stop ci-mongo || true
          docker rm ci-mongo || true


# ==================================================
# 2. SECURITY SCAN
# ==================================================
  security-scan:
    name: Security Scan
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0


# ==================================================
# 3. VERSIONING
# ==================================================
  versioning:
    name: Versioning
    runs-on: self-hosted

    outputs:
      version: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Version Tag
        id: version
        run: |
          TAG=v1.0.${{ github.run_number }}
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create Git Tag
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git tag ${{ steps.version.outputs.tag }} || true
          git push origin ${{ steps.version.outputs.tag }} || true


# ==================================================
# 4. DOCKER BUILD AND PUSH
# ==================================================
  docker-build-push:
    name: Docker Build Push
    runs-on: self-hosted

    needs:
      - unit-test
      - security-scan
      - versioning

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Docker Metadata Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha
            type=raw,value=latest
            type=raw,value=${{ needs.versioning.outputs.version }}

      - name: Set Docker Metadata Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha
            type=raw,value=latest
            type=raw,value=${{ needs.versioning.outputs.version }}

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


# ==================================================
# 5. SLACK NOTIFICATION
# ==================================================
  slack-notification:
    name: Slack Notification
    runs-on: self-hosted

    needs:
      - unit-test
      - security-scan
      - versioning
      - docker-build-push

    if: always()

    steps:
      - name: Slack Success Notification
        if: ${{ needs.unit-test.result == 'success' && needs.security-scan.result == 'success' && needs.versioning.result == 'success' && needs.docker-build-push.result == 'success' }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: Pipeline Success
          SLACK_COLOR: good
          SLACK_MESSAGE: |
            CI/CD Pipeline Successful

            Unit Test: SUCCESS
            Security Scan: SUCCESS
            Versioning: SUCCESS
            Docker Build Push: SUCCESS

            Commit: ${{ github.sha }}

      - name: Slack Failure Notification
        if: ${{ needs.unit-test.result != 'success' || needs.security-scan.result != 'success' || needs.versioning.result != 'success' || needs.docker-build-push.result != 'success' }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: Pipeline Failed
          SLACK_COLOR: danger
          SLACK_MESSAGE: |
            CI/CD Pipeline Failed

            Unit Test: ${{ needs.unit-test.result }}
            Security Scan: ${{ needs.security-scan.result }}
            Versioning: ${{ needs.versioning.result }}
            Docker Build Push: ${{ needs.docker-build-push.result }}

            Commit: ${{ github.sha }}
