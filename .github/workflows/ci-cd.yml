name: Ecommerce CI-CD Optimized Pipeline

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  IMAGE_BACKEND: pavan7302/ecommerce-backend
  IMAGE_FRONTEND: pavan7302/ecommerce-frontend

jobs:
# ==========================================
# UNIT TEST
# ==========================================
  unit-test:
    name: Unit Test
    runs-on: self-hosted

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      - name: Run Tests
        run: |
          cd backend
          npm test
        env:
          NODE_ENV: test
          MONGODB_URL: mongodb://127.0.0.1:27017/ecommerce


# ==========================================
# SECURITY SCAN
# ==========================================
  security-scan:
    name: Security Scan
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: fs
          scan-ref: ./backend
          severity: HIGH,CRITICAL
          format: table


# ==========================================
# VERSIONING (FAST GIT TAG)
# ==========================================
  versioning:
    name: Versioning
    runs-on: self-hosted

    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Create Version Tag
        id: tag
        run: |
          LAST_TAG=$(git tag --sort=-v:refname | head -n 1)

          if [ -z "$LAST_TAG" ]; then
            NEW_TAG="v1.0.0"
          else
            VERSION=${LAST_TAG#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            PATCH=$((PATCH+1))
            NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          fi

          git tag $NEW_TAG
          git push origin $NEW_TAG

          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT


# ==========================================
# BACKEND DOCKER BUILD
# ==========================================
  docker-backend:
    name: Docker Backend Build
    runs-on: self-hosted

    needs:
      - unit-test
      - security-scan
      - versioning

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ needs.versioning.outputs.tag }}


# ==========================================
# FRONTEND DOCKER BUILD
# ==========================================
  docker-frontend:
    name: Docker Frontend Build
    runs-on: self-hosted

    needs:
      - unit-test
      - security-scan
      - versioning

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ needs.versioning.outputs.tag }}


# ==========================================
# SLACK NOTIFICATION
# ==========================================
  slack-notification:
    name: Slack Notification
    runs-on: self-hosted

    needs:
      - unit-test
      - security-scan
      - versioning
      - docker-backend
      - docker-frontend

    if: always()

    steps:
      - name: Slack Success
        if: ${{ needs.unit-test.result == 'success' && needs.security-scan.result == 'success' && needs.docker-backend.result == 'success' && needs.docker-frontend.result == 'success' }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: good
          SLACK_TITLE: Pipeline Success
          SLACK_MESSAGE: |
            Unit Test Passed
            Security Scan Passed
            Backend Docker Push Success
            Frontend Docker Push Success
            Version Created: ${{ needs.versioning.outputs.tag }}

      - name: Slack Failure
        if: ${{ needs.unit-test.result != 'success' || needs.security-scan.result != 'success' || needs.docker-backend.result != 'success' || needs.docker-frontend.result != 'success' }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: danger
          SLACK_TITLE: Pipeline Failed
          SLACK_MESSAGE: |
            One or more jobs failed.
            Check GitHub Actions logs.
