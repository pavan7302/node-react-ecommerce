name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: backend

jobs:

####################################################
# 1. UNIT TESTS
####################################################

  test:
    name: Unit Tests
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install Dependencies
        working-directory: backend
        run: npm ci

      - name: Run Unit Tests
        working-directory: backend
        env:
          MONGODB_URL: mongodb://localhost:27017/ecommerce
        run: npm test

####################################################
# 2. SECURITY SCAN
####################################################

  security_scan:
    name: Security Scan
    needs: test
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

####################################################
# 3. VERSIONING
####################################################

  versioning:
    name: Generate Version
    needs: security_scan
    runs-on:
      - self-hosted
      - linux

    outputs:
      version: ${{ steps.version.outputs.new_tag }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate Version Tag
        id: version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v

####################################################
# 4. BUILD & PUSH DOCKER IMAGE
####################################################

  docker_build_push:
    name: Build and Push Docker Image
    needs: versioning
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/backend
          tags: |
            type=raw,value=${{ needs.versioning.outputs.version }}
            type=sha
            type=ref,event=branch
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=backend
            org.opencontainers.image.description=Node React Ecommerce Backend
            org.opencontainers.image.version=${{ needs.versioning.outputs.version }}
            org.opencontainers.image.created={{date 'YYYY-MM-DD'}}
            org.opencontainers.image.revision={{sha}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

####################################################
# 5. DEPLOY APPLICATION
####################################################

  deploy:
    name: Deploy Application
    needs: docker_build_push
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Pull Latest Image
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/backend:latest

      - name: Restart Application
        run: |
          docker compose down
          docker compose up -d

####################################################
# 6. HEALTH CHECK
####################################################

  health_check:
    name: Application Health Check
    needs: deploy
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Wait for App Startup
        run: sleep 15

      - name: Check Backend API
        run: |
          curl -f http://localhost:5000/api/products || exit 1

####################################################
# 7. SLACK NOTIFICATION
####################################################

  notify:
    name: Slack Notification
    if: always()

    needs:
      - test
      - security_scan
      - versioning
      - docker_build_push
      - deploy
      - health_check

    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Notify Success
        if: ${{ needs.health_check.result == 'success' }}
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚀 Pipeline Successful

              ✅ Unit Tests Passed
              ✅ Security Scan Passed
              ✅ Version Created
              ✅ Docker Image Built & Pushed
              ✅ Deployment Successful
              ✅ Health Check Passed

              Version: ${{ needs.versioning.outputs.version }}"
            }

      - name: Notify Failure
        if: ${{ needs.health_check.result != 'success' }}
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Pipeline Failed

              Test: ${{ needs.test.result }}
              Security Scan: ${{ needs.security_scan.result }}
              Docker Build: ${{ needs.docker_build_push.result }}
              Deploy: ${{ needs.deploy.result }}
              Health Check: ${{ needs.health_check.result }}"
            }
