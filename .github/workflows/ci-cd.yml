
name: Ecommerce CI-CD Pipeline

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  IMAGE_BACKEND: pavan7302/ecommerce-backend
  IMAGE_FRONTEND: pavan7302/ecommerce-frontend

jobs:
# ==========================
# UNIT TEST
# ==========================
  unit-test:
    name: Unit Test
    runs-on: self-hosted

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        uses: bahmutov/npm-install@v1
        with:
          working-directory: backend

      - name: Run Unit Test
        uses: ArtiomTr/jest-coverage-report-action@v2
        with:
          working-directory: backend
          test-script: npm test
        env:
          NODE_ENV: test
          MONGODB_URL: mongodb://127.0.0.1:27017/ecommerce


# ==========================
# SECURITY SCAN
# ==========================
  security-scan:
    name: Security Scan
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Trivy Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-cache

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: table


# ==========================
# VERSIONING
# ==========================
  versioning:
    name: Versioning
    runs-on: self-hosted

    outputs:
      tag: ${{ steps.version.outputs.new_tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto Tag
        id: version
        uses: anothrNick/github-tag-action@1.70.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch


# ==========================
# BACKEND DOCKER BUILD
# ==========================
  docker-backend:
    name: Docker Backend Build
    runs-on: self-hosted

    needs:
      - unit-test
      - security-scan
      - versioning

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ needs.versioning.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


# ==========================
# FRONTEND DOCKER BUILD
# ==========================
  docker-frontend:
    name: Docker Frontend Build
    runs-on: self-hosted

    needs:
      - unit-test
      - security-scan
      - versioning

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ needs.versioning.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


# ==========================
# SLACK NOTIFICATION
# ==========================
  slack-notification:
    name: Slack Notification
    runs-on: self-hosted

    needs:
      - unit-test
      - security-scan
      - versioning
      - docker-backend
      - docker-frontend

    if: always()

    steps:
      - name: Success Slack
        if: ${{ needs.unit-test.result == 'success' && needs.security-scan.result == 'success' && needs.docker-backend.result == 'success' && needs.docker-frontend.result == 'success' }}

        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: good
          SLACK_TITLE: Pipeline Success
          SLACK_MESSAGE: |
            Unit Test Passed
            Security Scan Passed
            Backend Docker Push Success
            Frontend Docker Push Success
            Version Created: ${{ needs.versioning.outputs.tag }}

      - name: Failure Slack
        if: ${{ needs.unit-test.result != 'success' || needs.security-scan.result != 'success' || needs.docker-backend.result != 'success' || needs.docker-frontend.result != 'success' }}

        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: danger
          SLACK_TITLE: Pipeline Failed
          SLACK_MESSAGE: |
            One or more jobs failed.
            Check GitHub Actions logs.

