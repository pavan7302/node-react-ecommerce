name: Production DevOps Pipeline

on:
  push:
    branches:
      - master

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: backend

jobs:

#########################################################
# 1. UNIT TEST
#########################################################
  unit_test:
    name: Unit Test
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        working-directory: backend
        run: npm ci

      # Uses already running EC2 MongoDB
      - name: Run Unit Tests
        working-directory: backend
        env:
          MONGODB_URL: mongodb://localhost:27017/ecommerce_test
          NODE_ENV: test
        run: npm test


#########################################################
# 2. SECURITY SCAN
#########################################################
  security_scan:
    name: Security Scan
    needs: unit_test
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: table
          exit-code: 1


#########################################################
# 3. VERSIONING
#########################################################
  versioning:
    name: Semantic Versioning
    needs: security_scan
    runs-on: [self-hosted, linux]

    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate Version Tag
        id: bump
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v


#########################################################
# 4. BUILD AND PUSH
#########################################################
  build_push:
    name: Build and Push Docker Image
    needs: versioning
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/backend
          tags: |
            type=raw,value=latest
            type=sha
            type=raw,value=${{ needs.versioning.outputs.new_tag }}

          labels: |
            org.opencontainers.image.title=backend
            org.opencontainers.image.description=Node React Ecommerce Backend
            org.opencontainers.image.version=${{ needs.versioning.outputs.new_tag }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.repository }}

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          # Fastest builds
          cache-from: type=gha
          cache-to: type=gha,mode=max


#########################################################
# 5. DEPLOY
#########################################################
  deploy:
    name: Deploy Application
    needs: build_push
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Pull Latest Image
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/backend:latest

      - name: Restart Application
        run: |
          cd /home/ubuntu/node-react-ecommerce
          docker compose down
          docker compose up -d


#########################################################
# 6. SLACK NOTIFICATION
#########################################################
  notify:
    name: Slack Notification
    if: always()

    needs:
      - unit_test
      - security_scan
      - versioning
      - build_push
      - deploy

    runs-on: [self-hosted, linux]

    steps:
      - name: Slack Success
        if: ${{ needs.deploy.result == 'success' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ Pipeline Successful

              Version: ${{ needs.versioning.outputs.new_tag }}

              Unit Test: Passed
              Security Scan: Passed
              Docker Build: Success
              Deployment: Success"
            }

      - name: Slack Failure
        if: ${{ needs.deploy.result != 'success' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Pipeline Failed

              Unit Test: ${{ needs.unit_test.result }}
              Security Scan: ${{ needs.security_scan.result }}
              Build: ${{ needs.build_push.result }}
              Deploy: ${{ needs.deploy.result }}"
            }


#########################################################
# 7. CLEANUP
#########################################################
  cleanup:
    name: Cleanup Runner
    if: always()
    needs:
      - deploy

    runs-on: [self-hosted, linux]

    steps:
      - name: Cleanup Docker Cache
        run: |
          docker builder prune -af || true
          docker image prune -af || true
