name: Ecommerce CI-CD Pipeline

on:
  push:
    branches:
      - master

concurrency:
  group: ecommerce-pipeline
  cancel-in-progress: true

permissions:
  contents: write

jobs:

  # ==========================================
  # 1. UNIT TEST
  # ==========================================
  unit-test:
    name: Unit Test
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      # If mongo already running permanently on EC2 remove this step
      - name: Start MongoDB Container
        run: |
          docker rm -f ci-mongo || true
          docker run -d --name ci-mongo -p 27017:27017 mongo:7
          sleep 10

      - name: Run Backend Tests
        run: |
          cd backend
          npm test

      - name: Stop MongoDB
        if: always()
        run: |
          docker rm -f ci-mongo || true


  # ==========================================
  # 2. SECURITY SCAN
  # ==========================================
  security-scan:
    name: Security Scan
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 0


  # ==========================================
  # 3. VERSIONING
  # ==========================================
  versioning:
    name: Versioning
    runs-on: self-hosted

    outputs:
      version: ${{ steps.version.outputs.new_version }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Version Tag
        id: version
        uses: anothrNick/github-tag-action@1.70.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          WITH_V: true


  # ==========================================
  # 4. DOCKER BUILD + PUSH
  # ==========================================
  docker-build-push:
    name: Docker Build Push
    needs: [unit-test, security-scan, versioning]
    runs-on: self-hosted

    strategy:
      matrix:
        service: [backend, frontend]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            pavan7302/${{ matrix.service }}:latest
            pavan7302/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ==========================================
  # 5. SLACK NOTIFICATION
  # ==========================================
  slack-notification:
    name: Slack Notification
    if: always()
    needs: [unit-test, security-scan, versioning, docker-build-push]
    runs-on: self-hosted

    steps:
      - name: Send Slack Notification
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              "text": "GitHub Actions Pipeline Result",
              "attachments": [{
                "color": "${{ job.status == 'success' && 'good' || 'danger' }}",
                "fields": [
                  {
                    "title": "Repository",
                    "value": "${{ github.repository }}",
                    "short": true
                  },
                  {
                    "title": "Branch",
                    "value": "${{ github.ref_name }}",
                    "short": true
                  },
                  {
                    "title": "Unit Test",
                    "value": "${{ needs.unit-test.result }}",
                    "short": true
                  },
                  {
                    "title": "Security Scan",
                    "value": "${{ needs.security-scan.result }}",
                    "short": true
                  },
                  {
                    "title": "Docker Build",
                    "value": "${{ needs.docker-build-push.result }}",
                    "short": true
                  },
                  {
                    "title": "Versioning",
                    "value": "${{ needs.versioning.result }}",
                    "short": true
                  }
                ]
              }]
            }

        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
