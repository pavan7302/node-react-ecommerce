name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - master

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: backend

jobs:

  #########################################################
  # 1. UNIT TEST
  #########################################################
  unit_test:
    name: Unit Test
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # Cleanup any stale containers from old failed runs
      - name: Cleanup Old Mongo Containers
        run: |
          docker rm -f $(docker ps -aq --filter "name=ci-mongo") || true

      # Dynamic container name avoids collision
      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.0
        with:
          mongodb-version: 7
          mongodb-container-name: ci-mongo-${{ github.run_id }}

      - name: Install Dependencies
        working-directory: backend
        run: npm ci

      - name: Run Unit Tests
        working-directory: backend
        env:
          MONGODB_URL: mongodb://localhost:27017/ecommerce
          NODE_ENV: test
        run: npm test

      - name: Cleanup Mongo
        if: always()
        run: |
          docker rm -f ci-mongo-${{ github.run_id }} || true


  #########################################################
  # 2. SECURITY SCAN
  #########################################################
  security_scan:
    name: Security Scan
    needs: unit_test
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1


  #########################################################
  # 3. VERSIONING
  #########################################################
  versioning:
    name: Versioning
    needs: security_scan
    runs-on:
      - self-hosted
      - linux

    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Bump Version Tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v


  #########################################################
  # 4. BUILD AND PUSH
  #########################################################
  build_push:
    name: Build and Push Docker Image
    needs: versioning
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Generates tags + labels automatically
      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/backend
          tags: |
            type=raw,value=latest
            type=sha
            type=raw,value=${{ needs.versioning.outputs.new_tag }}

          labels: |
            org.opencontainers.image.title=backend
            org.opencontainers.image.description=Node React Ecommerce Backend
            org.opencontainers.image.version=${{ needs.versioning.outputs.new_tag }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          # Layer cache -> faster runtime
          cache-from: type=gha
          cache-to: type=gha,mode=max


  #########################################################
  # 5. SLACK NOTIFICATION
  #########################################################
  notify:
    name: Slack Notification

    needs:
      - unit_test
      - security_scan
      - versioning
      - build_push

    if: always()

    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Notify Success
        if: ${{ needs.unit_test.result == 'success' && needs.security_scan.result == 'success' && needs.build_push.result == 'success' }}

        uses: slackapi/slack-github-action@v2

        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook

          payload: |
            {
              "text": "✅ Pipeline Success

              Version: ${{ needs.versioning.outputs.new_tag }}

              Unit Test: Passed
              Security Scan: Passed
              Docker Push: Success"
            }

      - name: Notify Failure
        if: ${{ needs.unit_test.result != 'success' || needs.security_scan.result != 'success' || needs.build_push.result != 'success' }}

        uses: slackapi/slack-github-action@v2

        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook

          payload: |
            {
              "text": "❌ Pipeline Failed

              Unit Test: ${{ needs.unit_test.result }}
              Security Scan: ${{ needs.security_scan.result }}
              Build: ${{ needs.build_push.result }}"
            }
