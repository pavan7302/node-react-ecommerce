name: CI-CD Pipeline

on:
  push:
    branches:
      - master

jobs:

  # =========================
  # 1. UNIT TEST
  # =========================
  unit-test:
    name: Unit Test
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Start MongoDB
        run: |
          docker run -d \
            --name ci-mongo \
            -p 27017:27017 \
            mongo:7

      - name: Run Unit Tests
        run: |
          cd backend
          npm test

      - name: Stop MongoDB
        if: always()
        run: docker rm -f ci-mongo


  # =========================
  # 2. SECURITY SCAN
  # =========================
  security-scan:
    name: Security Scan
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .


  # =========================
  # 3. VERSIONING
  # =========================
  versioning:
    name: Versioning
    runs-on: self-hosted

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Version Tag
        id: version
        run: |
          VERSION=v1.${{ github.run_number }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"


  # =========================
  # 4. DOCKER BUILD + PUSH
  # =========================
  docker-build-push:
    name: Docker Build Push
    runs-on: self-hosted
    needs: [unit-test, security-scan, versioning]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4


      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      # BACKEND IMAGE

      - name: Build Backend Image
        run: |
          docker build \
          -t pavan7302/ecommerce-backend:${{ needs.versioning.outputs.version }} \
          ./backend

      - name: Push Backend Image
        run: |
          docker push \
          pavan7302/ecommerce-backend:${{ needs.versioning.outputs.version }}


      # FRONTEND IMAGE

      - name: Build Frontend Image
        run: |
          docker build \
          -t pavan7302/ecommerce-frontend:${{ needs.versioning.outputs.version }} \
          ./frontend

      - name: Push Frontend Image
        run: |
          docker push \
          pavan7302/ecommerce-frontend:${{ needs.versioning.outputs.version }}


      # LATEST TAGS

      - name: Tag Latest Backend
        run: |
          docker tag \
          pavan7302/ecommerce-backend:${{ needs.versioning.outputs.version }} \
          pavan7302/ecommerce-backend:latest

      - name: Push Latest Backend
        run: docker push pavan7302/ecommerce-backend:latest

      - name: Tag Latest Frontend
        run: |
          docker tag \
          pavan7302/ecommerce-frontend:${{ needs.versioning.outputs.version }} \
          pavan7302/ecommerce-frontend:latest

      - name: Push Latest Frontend
        run: docker push pavan7302/ecommerce-frontend:latest


  # =========================
  # 5. SLACK NOTIFICATION
  # =========================
  slack-notification:
    name: Slack Notification
    runs-on: self-hosted
    needs: [unit-test, security-scan, docker-build-push]

    if: always()

    steps:
      - name: Slack Notification
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              "text": "*Pipeline Result* 🚀\n
              Repository: ${{ github.repository }}\n
              Branch: ${{ github.ref_name }}\n
              Unit Test: ${{ needs.unit-test.result }}\n
              Security Scan: ${{ needs.security-scan.result }}\n
              Docker Build: ${{ needs.docker-build-push.result }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
