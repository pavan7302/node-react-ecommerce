name: Production DevOps Pipeline

on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:

#########################################################
# 1. TEST
#########################################################

  test:
    name: Run Unit Tests
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci

      - name: Run MongoDB Container
        run: |
          docker rm -f ci-mongo || true
          docker run -d \
            --name ci-mongo \
            -p 27018:27017 \
            mongo:7

      - name: Wait For MongoDB
        run: |
          sleep 15

      - name: Execute Tests
        working-directory: backend
        env:
          MONGODB_URL: mongodb://localhost:27018/ecommerce
          NODE_ENV: test
        run: npm test

      - name: Cleanup MongoDB
        if: always()
        run: |
          docker rm -f ci-mongo || true


#########################################################
# 2. SECURITY SCAN
#########################################################

  security_scan:
    name: Security Scan
    needs: test
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1


#########################################################
# 3. BUILD AND PUSH IMAGE
#########################################################

  build_push:
    name: Build And Push Docker Image
    needs: security_scan
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build And Push Backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/backend:latest


#########################################################
# 4. DEPLOY
#########################################################

  deploy:
    name: Deploy Application
    needs: build_push
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Pull Latest Backend
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/backend:latest

      - name: Deploy Containers
        run: |
          cd /home/ubuntu/node-react-ecommerce

          docker compose down || true

          docker compose up -d


#########################################################
# 5. NOTIFICATION
#########################################################

  notify:
    name: Slack Notification
    needs:
      - test
      - security_scan
      - build_push
      - deploy

    if: always()

    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Slack Success
        if: ${{ needs.deploy.result == 'success' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Pipeline Successful ✅

              Tests Passed
              Security Scan Passed
              Docker Push Success
              Deployment Success"
            }

      - name: Slack Failure
        if: ${{ needs.deploy.result != 'success' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Pipeline Failed ❌"
            }
