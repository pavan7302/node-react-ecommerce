name: CTO DevOps Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: pavan7302/node-react-ecommerce

jobs:
#############################################
# 1. UNIT TEST
#############################################
  unit-test:
    name: Unit Test
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Start MongoDB Container
        run: |
          docker rm -f mongodb || true
          docker run -d \
            --name mongodb \
            -p 27017:27017 \
            mongo:7

          sleep 10

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci

      - name: Run Backend Tests
        working-directory: backend
        env:
          NODE_ENV: test
          MONGODB_URL: mongodb://localhost:27017/ecommerce
        run: npm test

      - name: Cleanup MongoDB
        if: always()
        run: |
          docker stop mongodb || true
          docker rm mongodb || true

#############################################
# 2. SECURITY SCAN
#############################################
  security-scan:
    name: Security Scan
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0

#############################################
# 3. VERSIONING
#############################################
  versioning:
    name: Versioning
    runs-on: self-hosted

    outputs:
      version: ${{ steps.version.outputs.new_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Version
        id: version
        run: |
          VERSION=v1.${{ github.run_number }}
          echo "new_tag=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

#############################################
# 4. BUILD AND PUSH
#############################################
  build-push:
    name: Build and Push Docker
    runs-on: self-hosted
    needs:
      - unit-test
      - security-scan
      - versioning

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
          -u "${{ secrets.DOCKER_USERNAME }}" \
          --password-stdin

      - name: Build Backend Image
        run: |
          docker build \
          -t $IMAGE_NAME:${{ needs.versioning.outputs.version }} \
          -t $IMAGE_NAME:latest \
          ./backend

      - name: Push Version Tag
        run: |
          docker push $IMAGE_NAME:${{ needs.versioning.outputs.version }}

      - name: Push Latest Tag
        run: |
          docker push $IMAGE_NAME:latest

#############################################
# 5. SLACK NOTIFICATION
#############################################
  slack:
    name: Slack Notification
    runs-on: self-hosted
    needs:
      - build-push

    steps:
      - name: Send Slack Notification
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{
            "text":"✅ CI/CD Success\nProject: node-react-ecommerce\nVersion: ${{ github.run_number }}\nDocker Image Pushed Successfully"
          }' \
          ${{ secrets.SLACK_WEBHOOK }}
