name: Production CI/CD Pipeline

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  IMAGE_NAME: backend

jobs:

##########################################################
# 1. UNIT TEST
##########################################################

  unit_test:
    name: Unit Test
    runs-on:
      - self-hosted
      - ci-runner

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Cleanup Old Mongo Containers
        run: |
          docker rm -f ci-mongo || true

      - name: Start MongoDB Container
        run: |
          docker run -d \
            --name ci-mongo \
            -p 27018:27017 \
            mongo:7

      - name: Wait for MongoDB
        run: sleep 10

      - name: Install Dependencies
        working-directory: backend
        run: npm ci

      - name: Run Unit Tests
        working-directory: backend
        env:
          NODE_ENV: test
          MONGODB_URL: mongodb://localhost:27018/ecommerce
        run: npm test

      - name: Cleanup MongoDB
        if: always()
        run: |
          docker rm -f ci-mongo || true


##########################################################
# 2. SECURITY SCAN
##########################################################

  security_scan:
    name: Security Scan
    needs: unit_test
    runs-on:
      - self-hosted
      - ci-runner

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1


##########################################################
# 3. VERSIONING
##########################################################

  versioning:
    name: Semantic Versioning
    needs: security_scan
    runs-on:
      - self-hosted
      - ci-runner

    outputs:
      version: ${{ steps.version.outputs.new_tag }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate Version
        id: version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v


##########################################################
# 4. BUILD AND PUSH
##########################################################

  build_push:
    name: Build and Push Docker Image
    needs: versioning
    runs-on:
      - self-hosted
      - ci-runner

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/backend
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.versioning.outputs.version }}
            type=sha
            type=ref,event=branch
          labels: |
            org.opencontainers.image.title=backend
            org.opencontainers.image.description=Node React Ecommerce Backend
            org.opencontainers.image.version=${{ needs.versioning.outputs.version }}
            org.opencontainers.image.revision={{sha}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Cleanup Docker Cache
        if: always()
        run: |
          docker image prune -f || true


##########################################################
# 5. DEPLOY
##########################################################

  deploy:
    name: Deploy to Production
    needs: build_push
    runs-on:
      - self-hosted
      - ci-runner

    steps:
      - name: Deploy to EC2 Production Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /home/ubuntu/node-react-ecommerce
            docker compose pull
            docker compose down
            docker compose up -d


##########################################################
# 6. SLACK NOTIFICATION
##########################################################

  notify:
    name: Slack Notification
    if: always()

    needs:
      - unit_test
      - security_scan
      - versioning
      - build_push
      - deploy

    runs-on:
      - self-hosted
      - ci-runner

    steps:
      - name: Notify Success
        if: ${{ needs.deploy.result == 'success' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚀 Pipeline Successful

              Version: ${{ needs.versioning.outputs.version }}

              Unit Test: Passed
              Security Scan: Passed
              Docker Push: Success
              Deploy: Success"
            }

      - name: Notify Failure
        if: ${{ needs.deploy.result != 'success' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Pipeline Failed

              Unit Test: ${{ needs.unit_test.result }}
              Security Scan: ${{ needs.security_scan.result }}
              Build: ${{ needs.build_push.result }}
              Deploy: ${{ needs.deploy.result }}"
            }
