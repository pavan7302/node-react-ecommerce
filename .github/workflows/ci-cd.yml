name: Ecommerce CI-CD Optimized Pipeline

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  IMAGE_BACKEND: pavan7302/ecommerce-backend
  IMAGE_FRONTEND: pavan7302/ecommerce-frontend

jobs:

# =========================================
# UNIT TEST
# =========================================

  unit-test:
    name: Unit Test
    runs-on: self-hosted

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        uses: bahmutov/npm-install@v1
        with:
          working-directory: backend

      - name: Run Test
        run: cd backend && npm test
        env:
          NODE_ENV: test
          MONGODB_URL: mongodb://127.0.0.1:27017/ecommerce


# =========================================
# SECURITY SCAN
# =========================================

  security-scan:
    name: Security Scan
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: table


# =========================================
# VERSIONING
# =========================================

  versioning:
    name: Versioning
    runs-on: self-hosted

    outputs:
      tag: ${{ steps.version.outputs.new_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto Version Tag
        id: version
        uses: anothrNick/github-tag-action@1.70.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          WITH_V: true


# =========================================
# BACKEND DOCKER BUILD
# =========================================

  docker-backend:
    name: Docker Backend Build
    runs-on: self-hosted

    needs:
      - unit-test
      - security-scan
      - versioning

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ needs.versioning.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


# =========================================
# FRONTEND DOCKER BUILD
# =========================================

  docker-frontend:
    name: Docker Frontend Build
    runs-on: self-hosted

    needs:
      - unit-test
      - security-scan
      - versioning

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ needs.versioning.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


# =========================================
# SLACK NOTIFICATION
# =========================================

  slack-notification:
    name: Slack Notification
    runs-on: self-hosted

    needs:
      - unit-test
      - security-scan
      - docker-backend
      - docker-frontend
      - versioning

    if: always()

    steps:

      - name: Slack Success
        if: ${{ needs.unit-test.result == 'success' && needs.security-scan.result == 'success' && needs.docker-backend.result == 'success' && needs.docker-frontend.result == 'success' }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: good
          SLACK_TITLE: Pipeline Success
          SLACK_MESSAGE: |
            Unit Test Passed
            Security Scan Passed
            Backend Docker Push Success
            Frontend Docker Push Success
            Version: ${{ needs.versioning.outputs.tag }}

      - name: Slack Failure
        if: ${{ needs.unit-test.result != 'success' || needs.security-scan.result != 'success' || needs.docker-backend.result != 'success' || needs.docker-frontend.result != 'success' }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: danger
          SLACK_TITLE: Pipeline Failed
          SLACK_MESSAGE: Check GitHub Actions logs
