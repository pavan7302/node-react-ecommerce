name: DevOps Full Pipeline

on:
  push:
    branches:
      - master

env:
  APP_NAME: node-react-ecommerce

jobs:

########################################################
# JOB 1 — UNIT TESTS
########################################################

  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:

      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install Dependencies
        run: |
          cd backend
          npm install

      - name: Wait for MongoDB
        run: sleep 20

      - name: Run Unit Tests
        run: |
          cd backend
          MONGODB_URL=mongodb://localhost:27017/ecommerce npm test

      - name: Slack Test Success
        if: success()
        run: |
          curl -X POST -H "Content-type: application/json" \
          --data '{"text":"✅ UNIT TESTS PASSED"}' \
          ${{ secrets.SLACK_WEBHOOK }}

      - name: Slack Test Failure
        if: failure()
        run: |
          curl -X POST -H "Content-type: application/json" \
          --data '{"text":"❌ UNIT TESTS FAILED"}' \
          ${{ secrets.SLACK_WEBHOOK }}

########################################################
# JOB 2 — SECURITY SCAN
########################################################

  security_scan:
    needs: test
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v5

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Slack Security Success
        if: success()
        run: |
          curl -X POST -H "Content-type: application/json" \
          --data '{"text":"🛡 SECURITY SCAN PASSED"}' \
          ${{ secrets.SLACK_WEBHOOK }}

      - name: Slack Security Failure
        if: failure()
        run: |
          curl -X POST -H "Content-type: application/json" \
          --data '{"text":"⚠ SECURITY SCAN FAILED"}' \
          ${{ secrets.SLACK_WEBHOOK }}

########################################################
# JOB 3 — VERSIONING
########################################################

  versioning:
    needs: security_scan
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:

      - uses: actions/checkout@v5

      - name: Generate Version
        id: version
        run: |
          VERSION=v1.0.${{ github.run_number }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated Version: $VERSION"

      - name: Slack Version Created
        run: |
          curl -X POST -H "Content-type: application/json" \
          --data '{"text":"🏷 VERSION CREATED : v1.0.${{ github.run_number }}"}' \
          ${{ secrets.SLACK_WEBHOOK }}

########################################################
# JOB 4 — BUILD DOCKER IMAGES
########################################################

  docker_build:
    needs: versioning
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: |
          docker build -t backend-image ./backend

      - name: Build Frontend Image
        run: |
          docker build -t frontend-image ./frontend

      - name: Slack Build Success
        if: success()
        run: |
          curl -X POST -H "Content-type: application/json" \
          --data '{"text":"🐳 DOCKER BUILD SUCCESS"}' \
          ${{ secrets.SLACK_WEBHOOK }}

########################################################
# JOB 5 — PUSH TO DOCKER HUB
########################################################

  docker_push:
    needs: docker_build
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v5

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Tagged Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:v1.0.${{ github.run_number }} ./backend

      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:v1.0.${{ github.run_number }}

      - name: Slack Push Success
        run: |
          curl -X POST -H "Content-type: application/json" \
          --data '{"text":"📦 DOCKER IMAGE PUSHED TO DOCKER HUB"}' \
          ${{ secrets.SLACK_WEBHOOK }}

########################################################
# JOB 6 — FINAL STATUS
########################################################

  pipeline_status:
    if: always()

    needs:
      - test
      - security_scan
      - versioning
      - docker_build
      - docker_push

    runs-on: ubuntu-latest

    steps:

      - name: Final Success Notification
        if: needs.docker_push.result == 'success'
        run: |
          curl -X POST -H "Content-type: application/json" \
          --data '{"text":"🚀 FULL PIPELINE SUCCESS — READY FOR DEPLOYMENT"}' \
          ${{ secrets.SLACK_WEBHOOK }}

      - name: Final Failure Notification
        if: needs.docker_push.result == 'failure'
        run: |
          curl -X POST -H "Content-type: application/json" \
          --data '{"text":"🔥 PIPELINE FAILED"}' \
          ${{ secrets.SLACK_WEBHOOK }}
