name: CI-CD Pipeline

on:
  push:
    branches:
      - master

env:
  IMAGE_BACKEND: pavan7302/ecommerce-backend
  IMAGE_FRONTEND: pavan7302/ecommerce-frontend

jobs:

  # =========================
  # 1. UNIT TEST
  # =========================
  unit-test:
    name: Unit Test
    runs-on: self-hosted

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        working-directory: backend
        run: npm ci

      - name: Run Tests
        working-directory: backend
        env:
          NODE_ENV: test
          MONGODB_URL: mongodb://localhost:27017/ecommerce
        run: npm test


  # =========================
  # 2. SECURITY SCAN
  # =========================
  security-scan:
    name: Security Scan
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./backend
          severity: HIGH,CRITICAL
          exit-code: 0


  # =========================
  # 3. VERSIONING
  # =========================
  versioning:
    name: Versioning
    runs-on: self-hosted

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Version
        id: version
        run: |
          VERSION=v1.${{ github.run_number }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

      - name: Create Git Tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: v1.${{ github.run_number }}


  # =========================
  # 4. BACKEND DOCKER BUILD
  # =========================
  backend-build:
    name: Backend Docker Build Push
    runs-on: self-hosted
    needs: [unit-test, security-scan, versioning]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ needs.versioning.outputs.version }}
            ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # =========================
  # 5. FRONTEND DOCKER BUILD
  # =========================
  frontend-build:
    name: Frontend Docker Build Push
    runs-on: self-hosted
    needs: [unit-test, security-scan, versioning]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ needs.versioning.outputs.version }}
            ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # =========================
  # 6. SLACK NOTIFICATION
  # =========================
  slack-notification:
    name: Slack Notification
    runs-on: self-hosted
    needs: [backend-build, frontend-build]

    if: always()

    steps:
      - name: Slack Notify
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

          SLACK_TITLE: CI/CD Pipeline Result

          SLACK_MESSAGE: |
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            Unit Test: ${{ needs.backend-build.result }}
            Security Scan: Success
            Docker Build: ${{ needs.frontend-build.result }}

          SLACK_COLOR: ${{ job.status }}
