name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: backend

jobs:

####################################################
# 1. UNIT TEST
####################################################
  test:
    name: Unit Test
    runs-on:
      - self-hosted
      - linux

    services:
      mongo:
        image: mongo:7
        ports:
          - 37017:27017

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        working-directory: backend
        run: npm ci

      - name: Run Unit Tests
        working-directory: backend
        env:
          MONGODB_URL: mongodb://localhost:37017/ecommerce
          NODE_ENV: test
        run: npm test


####################################################
# 2. SECURITY SCAN
####################################################
  security_scan:
    name: Security Scan
    needs: test
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1


####################################################
# 3. VERSIONING
####################################################
  versioning:
    name: Semantic Versioning
    needs: security_scan
    runs-on:
      - self-hosted
      - linux

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate Semantic Version
        id: version
        uses: PaulHatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "BREAKING CHANGE"
          minor_pattern: "feat"

      - name: Show Version
        run: echo "Version = ${{ steps.version.outputs.version }}"


####################################################
# 4. BUILD AND PUSH
####################################################
  docker_build_push:
    name: Build and Push Docker Image
    needs: versioning
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/backend
          tags: |
            type=raw,value=${{ needs.versioning.outputs.version }}
            type=raw,value=latest
            type=sha
            type=ref,event=branch
          labels: |
            org.opencontainers.image.title=backend
            org.opencontainers.image.description=Node React Ecommerce Backend
            org.opencontainers.image.version=${{ needs.versioning.outputs.version }}
            org.opencontainers.image.revision={{sha}}
            org.opencontainers.image.source=${{ github.repository }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          # runtime optimization
          cache-from: type=gha
          cache-to: type=gha,mode=max


####################################################
# 5. SLACK NOTIFICATION
####################################################
  notify:
    name: Slack Notification
    if: always()

    needs:
      - test
      - security_scan
      - versioning
      - docker_build_push

    runs-on:
      - self-hosted
      - linux

    steps:

      - name: Notify Success
        if: ${{ needs.test.result == 'success' && needs.security_scan.result == 'success' && needs.versioning.result == 'success' && needs.docker_build_push.result == 'success' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚀 Pipeline Successful\n\nVersion: ${{ needs.versioning.outputs.version }}\n\nUnit Test: Passed\nSecurity Scan: Passed\nDocker Build & Push: Success"
            }

      - name: Notify Failure
        if: ${{ needs.test.result != 'success' || needs.security_scan.result != 'success' || needs.versioning.result != 'success' || needs.docker_build_push.result != 'success' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Pipeline Failed\n\nTest: ${{ needs.test.result }}\nSecurity: ${{ needs.security_scan.result }}\nVersioning: ${{ needs.versioning.result }}\nBuild: ${{ needs.docker_build_push.result }}"
            }
