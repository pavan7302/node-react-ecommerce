name: CI-CD  Pipeline

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/node-react-ecommerce

# Prevent duplicate runs
concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: true

jobs:

# ==================================================
# 1 UNIT TEST
# ==================================================
  unit-test:
    name: Unit Test
    runs-on: [self-hosted, linux, x64, devops-runner]

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - uses: bahmutov/npm-install@v1
        with:
          working-directory: backend

      - name: Run Tests
        working-directory: backend
        env:
          NODE_ENV: test
          MONGODB_URL: mongodb://localhost:27017/ecommerce
        run: npm test


# ==================================================
# 2 SECURITY SCAN (parallel)
# ==================================================
  security-scan:
    name: Security Scan
    runs-on: [self-hosted, linux, x64, devops-runner]

    steps:
      - uses: actions/checkout@v4

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL


# ==================================================
# 3 VERSIONING (every push)
# ==================================================
  versioning:
    name: Versioning
    runs-on: [self-hosted, linux, x64, devops-runner]

    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: tag
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          WITH_V: true


# ==================================================
# 4 DOCKER BUILD + PUSH
# waits for all quality gates
# ==================================================
  docker-build-push:
    name: Docker Build Push
    runs-on: [self-hosted, linux, x64, devops-runner]

    needs:
      - unit-test
      - security-scan
      - versioning

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      - name: Build Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ needs.versioning.outputs.tag }}


# ==================================================
# 5 SINGLE SLACK
# ==================================================
  slack-notification:
    name: Slack Notification
    runs-on: [self-hosted, linux, x64, devops-runner]

    needs:
      - unit-test
      - security-scan
      - versioning
      - docker-build-push

    if: always()

    steps:

      - name: Success Notification
        if: ${{ needs.unit-test.result == 'success' &&
                needs.security-scan.result == 'success' &&
                needs.versioning.result == 'success' &&
                needs.docker-build-push.result == 'success' }}

        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: good
          SLACK_TITLE: Pipeline Success
          SLACK_MESSAGE: |
            Unit Test Passed
            Security Scan Passed
            Version Created
            Docker Image Pushed
            Deployment Ready


      - name: Failure Notification
        if: ${{ failure() }}

        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: danger
          SLACK_TITLE: Pipeline Failed
          SLACK_MESSAGE: |
            One or more pipeline stages failed.
            Check GitHub Actions logs.
