name: Production DevOps CI/CD Pipeline

on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:

#########################################################
# 1. TEST
#########################################################

  test:
    name: Unit Tests
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.0
        with:
          mongodb-version: 7
          mongodb-port: 27018

      - name: Install Dependencies
        working-directory: backend
        run: npm ci

      - name: Run Unit Tests
        working-directory: backend
        env:
          MONGODB_URL: mongodb://localhost:27018/ecommerce
          NODE_ENV: test
        run: npm test


#########################################################
# 2. SECURITY SCAN
#########################################################

  security_scan:
    name: Security Scan
    needs: test
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ./backend
          severity: CRITICAL,HIGH
          format: table
          exit-code: 1


#########################################################
# 3. VERSIONING
#########################################################

  versioning:
    name: Generate Semantic Version
    needs: security_scan
    runs-on:
      - self-hosted
      - linux

    outputs:
      version: ${{ steps.version.outputs.version_tag }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate Version
        id: version
        uses: PaulHatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "BREAKING CHANGE"
          minor_pattern: "feat"

#########################################################
# 4. BUILD + TAG + LABEL + PUSH
#########################################################

  docker_build_push:
    name: Build and Push Docker Image
    needs: versioning
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/backend
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.versioning.outputs.version }}
            type=sha
            type=ref,event=branch
          labels: |
            org.opencontainers.image.title=backend
            org.opencontainers.image.description=Node React Ecommerce Backend
            org.opencontainers.image.version=${{ needs.versioning.outputs.version }}
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created={{date 'YYYY-MM-DDTHH:mm:ssZ'}}

      - name: Build and Push Image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


#########################################################
# 5. DEPLOY
#########################################################

  deploy:
    name: Deploy Application
    needs: docker_build_push
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Pull Latest Backend Image
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/backend:latest

      - name: Restart Application
        run: |
          cd /home/ubuntu/node-react-ecommerce
          docker compose down
          docker compose pull
          docker compose up -d


#########################################################
# 6. SLACK NOTIFICATION
#########################################################

  notify:
    name: Slack Notification
    if: always()

    needs:
      - test
      - security_scan
      - versioning
      - docker_build_push
      - deploy

    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Notify Success
        if: ${{ needs.deploy.result == 'success' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚀 Production Pipeline Successful

              Version: ${{ needs.versioning.outputs.version }}

              Tests: Passed
              Security Scan: Passed
              Docker Build: Success
              Deployment: Success"
            }

      - name: Notify Failure
        if: ${{ needs.deploy.result != 'success' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Pipeline Failed

              Test: ${{ needs.test.result }}
              Security: ${{ needs.security_scan.result }}
              Build: ${{ needs.docker_build_push.result }}
              Deploy: ${{ needs.deploy.result }}"
            }
