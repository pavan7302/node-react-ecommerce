name: Production DevOps Pipeline

on:
  push:
    branches:
      - master

# REQUIRED FOR VERSION TAG PUSHING
permissions:
  contents: write

# CANCEL OLD RUNS IF NEW PUSH COMES
concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: backend

jobs:

#####################################################################
# 1. UNIT TEST
#####################################################################
  unit_test:
    name: Unit Test
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # CLEAN OLD TEST MONGO IF RUNNER REUSED
      - name: Remove Old Mongo Container
        run: |
          docker rm -f ci-mongo || true

      - name: Start MongoDB For Testing
        uses: supercharge/mongodb-github-action@1.12.0
        with:
          mongodb-version: 7
          mongodb-container-name: ci-mongo
          mongodb-port: 27019

      - name: Install Dependencies
        working-directory: backend
        run: npm ci --prefer-offline --no-audit

      - name: Run Unit Tests
        working-directory: backend
        env:
          NODE_ENV: test
          MONGODB_URL: mongodb://localhost:27019/ecommerce
        run: npm test

      - name: Cleanup Test Mongo
        if: always()
        run: |
          docker rm -f ci-mongo || true


#####################################################################
# 2. SECURITY SCAN
#####################################################################
  security_scan:
    name: Security Scan
    needs: unit_test
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: table
          exit-code: 1


#####################################################################
# 3. VERSIONING
#####################################################################
  versioning:
    name: Versioning
    needs: security_scan
    runs-on:
      - self-hosted
      - linux

    outputs:
      version: ${{ steps.tag_version.outputs.new_tag }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate Semantic Version
        id: tag_version
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          WITH_V: true


#####################################################################
# 4. BUILD AND PUSH DOCKER IMAGE
#####################################################################
  build_push:
    name: Build And Push
    needs: versioning
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/backend
          tags: |
            type=raw,value=${{ needs.versioning.outputs.version }}
            type=raw,value=latest
            type=sha
            type=ref,event=branch
          labels: |
            org.opencontainers.image.title=backend
            org.opencontainers.image.description=Node React Ecommerce Backend
            org.opencontainers.image.version=${{ needs.versioning.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.repository }}

      - name: Build and Push Image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          # CACHE FOR FAST BUILDS
          cache-from: type=gha
          cache-to: type=gha,mode=max


#####################################################################
# 5. SLACK NOTIFICATION
#####################################################################
  slack:
    name: Slack Notification

    needs:
      - unit_test
      - security_scan
      - versioning
      - build_push

    if: always()

    runs-on:
      - self-hosted
      - linux

    steps:

      - name: Slack Success Notification
        if: ${{ needs.unit_test.result == 'success' && needs.security_scan.result == 'success' && needs.build_push.result == 'success' }}

        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: good
          SLACK_TITLE: Pipeline Success
          SLACK_MESSAGE: |
            CI/CD Pipeline Successful

            Version : ${{ needs.versioning.outputs.version }}
            Unit Test : Passed
            Security Scan : Passed
            Docker Push : Success


      - name: Slack Failure Notification
        if: ${{ needs.unit_test.result != 'success' || needs.security_scan.result != 'success' || needs.build_push.result != 'success' }}

        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: danger
          SLACK_TITLE: Pipeline Failed
          SLACK_MESSAGE: |
            CI/CD Pipeline Failed

            Unit Test : ${{ needs.unit_test.result }}
            Security Scan : ${{ needs.security_scan.result }}
            Build Push : ${{ needs.build_push.result }}
