name: Production CI/CD Pipeline

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  IMAGE_NAME: backend

#########################################################
# 1. UNIT TEST
#########################################################
jobs:
  unit_test:
    name: Unit Test
    runs-on:
      - self-hosted
      - Linux

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.0
        with:
          mongodb-version: 7
          mongodb-port: 27017

      - name: Install Dependencies
        working-directory: backend
        run: npm ci --prefer-offline --no-audit

      - name: Run Unit Tests
        working-directory: backend
        env:
          NODE_ENV: test
          MONGODB_URL: mongodb://localhost:27017/ecommerce
        run: npm test

  #########################################################
  # 2. SECURITY SCAN
  #########################################################
  security_scan:
    name: Security Scan
    needs: unit_test
    runs-on:
      - self-hosted
      - Linux

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: table
          exit-code: 1

  #########################################################
  # 3. VERSIONING
  #########################################################
  versioning:
    name: Semantic Versioning
    needs: security_scan
    runs-on:
      - self-hosted
      - Linux

    outputs:
      version: ${{ steps.version.outputs.new_tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate Version Tag
        id: version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v

  #########################################################
  # 4. BUILD + PUSH
  #########################################################
  build_push:
    name: Build and Push Docker
    needs: versioning
    runs-on:
      - self-hosted
      - Linux

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/backend
          tags: |
            type=raw,value=${{ needs.versioning.outputs.version }}
            type=sha
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=backend
            org.opencontainers.image.description=Node Ecommerce Backend
            org.opencontainers.image.version=${{ needs.versioning.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and Push Image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  #########################################################
  # 5. SLACK
  #########################################################
  slack_notify:
    name: Slack Notification
    if: always()
    needs:
      - unit_test
      - security_scan
      - versioning
      - build_push

    runs-on:
      - self-hosted
      - Linux

    steps:
      - name: Notify Success
        if: ${{ needs.build_push.result == 'success' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "SUCCESS PIPELINE

              Version: ${{ needs.versioning.outputs.version }}

              Unit Test: Passed
              Security Scan: Passed
              Docker Build: Success"
            }

      - name: Notify Failure
        if: ${{ needs.build_push.result != 'success' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "FAILED PIPELINE

              Unit Test: ${{ needs.unit_test.result }}
              Security Scan: ${{ needs.security_scan.result }}
              Docker Build: ${{ needs.build_push.result }}"
            }
